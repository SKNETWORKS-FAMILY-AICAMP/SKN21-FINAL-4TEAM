name: CD

# ────────────────────────────────────────────────────────────
# develop 브랜치 push → dev EC2 자동 배포
# main    브랜치 push → prod EC2 자동 배포
# ────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true  # 연속 push 시 이전 배포 취소

jobs:
  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'
    environment: development    # GitHub 환경 보호 규칙 적용 가능

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Dev EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "=== [DEV] 배포 시작: $(date) ==="
            cd /opt/chatbot

            # 최신 코드 pull
            git fetch origin develop
            git reset --hard origin/develop

            # 코드 업데이트 배포 (dev 환경)
            bash deploy.sh update dev

            echo "=== [DEV] 배포 완료: $(date) ==="

  deploy-prod:
    name: Deploy → Prod
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    environment: production     # GitHub 환경 보호 규칙 적용 가능

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Prod EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_IP }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "=== [PROD] 배포 시작: $(date) ==="
            cd /opt/chatbot

            # 최신 코드 pull
            git fetch origin main
            git reset --hard origin/main

            # 코드 업데이트 배포 (prod 환경)
            bash deploy.sh update prod

            echo "=== [PROD] 배포 완료: $(date) ==="
